services:
  db:
    image: mariadb:11.4
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-per-table=1
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: moodle
      MARIADB_USER: moodleuser
      MARIADB_PASSWORD: moodlepass
    volumes:
      - db_data:/var/lib/mysql
      - ./moodle_db.sql.gz:/docker-entrypoint-initdb.d/001_moodle.sql.gz:ro
      - ./db-init/002_mvp_defaults.sql:/docker-entrypoint-initdb.d/002_mvp_defaults.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-http://localhost:8080}
    volumes:
      - ./code:/var/www/html
      - ./moodledata:/var/www/moodledata
    # DocumentRoot указывает в public/ — новая раскладка Moodle 5.x
    command: >
      bash -c "sed -ri 's#DocumentRoot /var/www/html(/public)*#DocumentRoot /var/www/html/public#' /etc/apache2/sites-available/000-default.conf &&
               printf '<Directory /var/www/html/public>\n  AllowOverride All\n  Require all granted\n</Directory>\n' > /etc/apache2/conf-available/moodle.conf &&
               a2enconf moodle &&
               php /var/www/html/admin/cli/upgrade.php --non-interactive &&
               (php /var/www/html/admin/cli/purge_caches.php || true) &&
               apache2-foreground"

  cron:
    build: .
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-http://localhost:8080}
    volumes:
      - ./code:/var/www/html
      - ./moodledata:/var/www/moodledata
    command: >
      bash -c "while true; do
                 timeout 55 php /var/www/html/admin/cli/cron.php --keep-alive=0 || true;
                 sleep 60;
               done"

volumes:
  db_data:
